<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>🎀 Predice Número Kawaii 🎀</title>

    <link rel="stylesheet" href="./css/index.css">

    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
</head>
<body>

    <div class="floating-hearts">
        💖 💕 🎀 🌸 💖 💕 🎀
    </div>

    <div class="container">

        <div class="header">
            <h1>🎀 Predice Número 🎀</h1>
            <h1>🎀 Autora: Marta Marina Bonilla Lémus 🎀</h1>
            <h1>🎀 Carnet: 0907 - 21 - 1613 🎀</h1>
            <p>✨ Dibuja un número bonito y mira la predicción ✨</p>
        </div>

        <div class="canvas-card">
            <canvas id="canvas" width="280" height="280"></canvas>
        </div>

        <div class="buttons">
            <button id="clear-btn">
                🧹 Limpiar
            </button>

            <button id="predict-btn">
                ✨ Predecir
            </button>
        </div>

        <div class="result-box">
            <h2>🌸 Número Detectado 🌸</h2>
            <div id="result">💗 ? 💗</div>
        </div>

    </div>

    <script src="./js/app.js"></script>

</body>
</html>
